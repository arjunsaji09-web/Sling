workflows:
  android-workflow:
    name: Android Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    cache:
      cache_paths:
        - ~/.npm
        - ~/.gradle/caches
        - ~/.gradle/wrapper
    environment:
      node: 20
      java: 17
    scripts:
      - name: Install dependencies
        script: |
          npm install --legacy-peer-deps
      - name: Build web project
        script: |
          npm run build
      - name: Sync Capacitor
        script: |
          npx cap sync android
      - name: Build Android APK
        script: |
          export ANDROID_HOME=$ANDROID_SDK_ROOT
          # Fix line endings and permissions for the Gradle wrapper
          cd android && tr -d '\r' < gradlew > gradlew.tmp && mv gradlew.tmp gradlew && chmod +x gradlew && cd ..
          # The Capacitor CLI build command handles Gradle and APK generation
          npx cap build android --apk --flavor debug
    artifacts:
      - android/app/build/outputs/apk/debug/app-debug.apk
    publishing:
      email:
        recipients:
          - arjunsaji09@gmail.com
        notify:
          success: true
          failure: true
