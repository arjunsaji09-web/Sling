workflows:
  android-workflow:
    name: Sling Android Build
    instance_type: mac_mini_m1
    environment:
      groups:
        - android-sdk
        - signing
      vars:
        FNC_KEYSTORE_REF: sling_release_key
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Build Android APK
        script: |
          npm run build
          npx cap sync android
          # Use Capacitor's internal build command to bypass manual gradle paths
          npx cap build android --androidreleasetype APK
    artifacts:
      - android/app/build/outputs/apk/release/*.apk
