workflows:
  android-workflow:
    name: Android Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    cache:
      cache_paths:
        - ~/.npm
        - ~/.gradle/caches
        - ~/.gradle/wrapper
    environment:
      node: 20
      java: 17
      groups:
        - android-sdk
        - signing
      vars:
        FNC_KEYSTORE_REF: sling_release_key
    scripts:
      - name: Install dependencies
        script: |
          npm install --legacy-peer-deps
      - name: Build web project
        script: |
          npm run build
      - name: Sync Capacitor
        script: |
          npx cap copy android
          npx cap sync android
      - name: Build and Sign Android APK
        script: |
          cd android
          # Fix line endings and permissions for the Gradle wrapper
          tr -d '\r' < gradlew > gradlew.tmp && mv gradlew.tmp gradlew
          chmod +x gradlew
          # Set SDK path
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          
          # Build the Release APK
          # Codemagic will automatically inject signing properties if configured in the UI
          ./gradlew assembleRelease --no-daemon
    artifacts:
      - android/app/build/outputs/apk/release/app-release.apk
    publishing:
      email:
        recipients:
          - admin@sling.app
        notify:
          success: true
          failure: true
