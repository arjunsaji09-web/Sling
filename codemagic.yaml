workflows:
  android-workflow:
    name: Sling Android Build
    instance_type: mac_mini_m1
    environment:
      groups:
        - android-sdk
        - signing
      vars:
        FNC_KEYSTORE_REF: sling_release_key
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Sync and Fix Permissions
        script: |
          # This fixes the exact error in the screenshot
          npm run build
          npx cap sync android
          cd android && chmod +x gradlew
      - name: Build Android APK
        script: |
          cd android && ./gradlew assembleRelease
    artifacts:
      - android/app/build/outputs/apk/release/*.apk
