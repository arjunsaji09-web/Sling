workflows:
  android-workflow:
    name: Android Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    cache:
      cache_paths:
        - ~/.npm
        - ~/.gradle/caches
        - ~/.gradle/wrapper
    environment:
      node: 20
      java: 17
      groups:
        - android-sdk
        - signing
      vars:
        FNC_KEYSTORE_REF: sling_release_key
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Generate Android Folder
        script: |
          npm run build
          npx cap sync android
      - name: Build and Sign Android APK
        script: |
          cd android && chmod +x gradlew && ./gradlew assembleRelease
    artifacts:
      - android/app/build/outputs/apk/release/app-release.apk
    publishing:
      email:
        recipients:
          - admin@sling.app
        notify:
          success: true
          failure: true
