workflows:
  android-workflow:
    name: Android Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    cache:
      cache_paths:
        - ~/.npm
        - ~/.gradle/caches
        - ~/.gradle/wrapper
    environment:
      node: 20
      java: 17
    scripts:
      - name: Install dependencies
        script: |
          npm install --legacy-peer-deps
      - name: Build web project
        script: |
          npm run build
      - name: Sync Capacitor
        script: |
          npx cap sync android
      - name: Build Android APK
        script: |
          cd android
          # Fix line endings and permissions
          tr -d '\r' < gradlew > gradlew.tmp && mv gradlew.tmp gradlew
          chmod +x gradlew
          # Accept licenses
          yes | sdkmanager --licenses || true
          # Set SDK path
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          # Clean and build with detailed logs
          ./gradlew clean assembleDebug --no-daemon --info --stacktrace
    artifacts:
      - android/app/build/outputs/apk/debug/*.apk
    publishing:
      email:
        recipients:
          - arjunsaji09@gmail.com
        notify:
          success: true
          failure: true
